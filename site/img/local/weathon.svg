<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="Weathon Software">
  <title>Weathon Software</title>
  <!-- Mark: a stylized "W" formed by two angled strokes overlaid by a horizon
       line and a small sun, evoking weather + compute. -->
  <g transform="translate(8 12)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- enclosing rounded square -->
    <rect x="0" y="0" width="56" height="56" rx="10" ry="10"
          fill="#0d1f3a" stroke="#0d1f3a" stroke-width="2"/>
    <!-- horizon -->
    <line x1="8" y1="36" x2="48" y2="36" stroke="#3aa1d4" stroke-width="2"/>
    <!-- sun -->
    <circle cx="40" cy="30" r="4.5" fill="#ffb84d" stroke="none"/>
    <!-- W mark (two angled strokes) -->
    <path d="M10 14 L18 36 L28 22 L38 36 L46 14"
          stroke="#f5f1ea" stroke-width="3.2"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(82 0)">
    <text x="0" y="44"
          font-family="'Inter','Helvetica Neue',Helvetica,Arial,sans-serif"
          font-weight="700" font-size="34" fill="#0d1f3a"
          letter-spacing="-0.5">Weathon</text>
    <text x="0" y="68"
          font-family="'Inter','Helvetica Neue',Helvetica,Arial,sans-serif"
          font-weight="500" font-size="14" fill="#5a6478"
          letter-spacing="2.4">SOFTWARE</text>
  </g>
</svg>
